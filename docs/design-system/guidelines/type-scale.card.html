<!-- @dsCard group="Type" viewport="700x250" name="Type Scale" subtitle="Hero → section → card → body → readout" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); color: var(--ink); padding: 20px 26px; }
  .line { display: flex; align-items: baseline; gap: 14px; border-bottom: 1px solid var(--line); padding: 8px 0; }
  .lbl { font-family: var(--mono); font-size: 10px; color: var(--muted); width: 120px; flex: none; }
  .disp { font-family: var(--display); color: var(--ink); font-weight: 800; letter-spacing: -0.025em; }
  .mono { font-family: var(--mono); color: var(--ink-2); }
</style>
</head>
<body>
  <div class="line"><span class="lbl">--fs-hero</span><span class="disp" style="font-size:2.7rem;line-height:0.9;text-transform:uppercase">OPERATIONAL</span></div>
  <div class="line"><span class="lbl">--fs-h2</span><span class="disp" style="font-size:1.9rem">Section title</span></div>
  <div class="line"><span class="lbl">--fs-h3</span><span class="disp" style="font-size:1.5rem">Card title</span></div>
  <div class="line"><span class="lbl">--fs-body</span><span class="disp" style="font-weight:400;font-size:1.05rem">Body copy in Bricolage Grotesque.</span></div>
  <div class="line"><span class="lbl">--fs-mono</span><span class="mono" style="font-size:0.82rem">readout · 0.82rem mono</span></div>
  <div class="line"><span class="lbl">--fs-mono-xs</span><span class="mono" style="font-size:0.68rem;letter-spacing:0.04em">CHIP · 0.68REM</span></div>
</body>
</html>
