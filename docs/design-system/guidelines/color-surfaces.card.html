<!-- @dsCard group="Colors" viewport="700x160" name="Canvas & Surfaces" subtitle="Deep ink canvas, raised panel, sunken well" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--mono); color: var(--ink); background: var(--bg); background-image: var(--grid-bg); background-size: 26px 26px; }
  .row { display: flex; gap: 14px; padding: 22px; }
  .sw { flex: 1; border: 1px solid var(--line-2); border-radius: 12px; overflow: hidden; }
  .chip { height: 60px; }
  .meta { padding: 8px 11px; background: var(--bg-elev); border-top: 1px solid var(--line); }
  .name { font-size: 11px; color: var(--ink); } .hex { font-size: 10px; color: var(--muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="meta"><div class="name">--bg</div><div class="hex">#0a0e0d · page</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-elev)"></div><div class="meta"><div class="name">--bg-elev</div><div class="hex">#111716 · panel</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-elev-2)"></div><div class="meta"><div class="name">--bg-elev-2</div><div class="hex">#161e1c · raised</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-sunk)"></div><div class="meta"><div class="name">--bg-sunk</div><div class="hex">#0c1110 · well</div></div></div>
  </div>
</body>
</html>
