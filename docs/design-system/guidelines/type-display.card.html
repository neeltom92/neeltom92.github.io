<!-- @dsCard group="Type" viewport="700x230" name="Display — Bricolage Grotesque" subtitle="Oversized, uppercase, tight negative tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); color: var(--ink); padding: 24px 26px; }
  .tag { font-family: var(--mono); font-size: 10px; color: var(--accent-deep); letter-spacing: 0.18em; text-transform: uppercase; }
  .name { font-family: var(--display); font-weight: 800; font-size: 3.6rem; line-height: 0.9; letter-spacing: -0.04em; text-transform: uppercase; margin: 12px 0 6px; }
  .accent { color: var(--accent); }
  .sub { font-family: var(--display); font-size: 1.1rem; color: var(--ink-2); max-width: 46ch; line-height: 1.5; }
</style>
</head>
<body>
  <div class="tag">--font-display · Bricolage Grotesque</div>
  <div class="name">NEEL THOMAS <span class="accent">THELLY</span></div>
  <div class="sub">The display voice is set big, uppercase and tight — editorial confidence on a dark canvas.</div>
</body>
</html>
