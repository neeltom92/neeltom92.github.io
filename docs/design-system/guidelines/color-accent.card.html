<!-- @dsCard group="Colors" viewport="700x170" name="Accent — Electric Lime" subtitle="The single phosphor accent + amber OSS signal" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--mono); color: var(--ink); background: var(--bg-elev); }
  .wrap { padding: 22px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .chip { height: 50px; }
  .meta { padding: 7px 11px; } .name { font-size: 11px; } .hex { font-size: 10px; color: var(--muted); }
  .note { font-size: 10px; color: var(--muted); margin-top: 13px; letter-spacing: 0.04em; }
  .live { color: #0a0e0d; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="meta"><div class="name">--accent</div><div class="hex">#c9f25b · phosphor</div></div></div>
      <div class="sw"><div class="chip" style="background:var(--accent-ink)"></div><div class="meta"><div class="name">--accent-ink</div><div class="hex">#d8ff72 · links</div></div></div>
      <div class="sw"><div class="chip" style="background:var(--accent-deep)"></div><div class="meta"><div class="name">--accent-deep</div><div class="hex">#9cc23f · eyebrow</div></div></div>
      <div class="sw"><div class="chip" style="background:var(--amber)"></div><div class="meta"><div class="name">--amber</div><div class="hex">#ffb454 · OSS</div></div></div>
    </div>
    <div class="note">One accent only. Lime = live / primary / links. Amber = open-source signal. Never both as fills in one element.</div>
  </div>
</body>
</html>
