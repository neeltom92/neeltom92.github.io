<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Neel Thomas Thelly — Portfolio UI Kit</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; min-width: 0; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--display); font-size: 18px; line-height: 1.6;
    -webkit-font-smoothing: antialiased; overflow-x: hidden;
    background-image: var(--grid-bg); background-size: var(--grid-size) var(--grid-size); }
  body > * { position: relative; z-index: 2; }
  ::selection { background: var(--accent); color: #0a0e0d; }
  a { color: var(--accent-ink); text-decoration: none; }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--pad); }
  .accent { color: var(--accent); }

  /* NAV */
  .kit-nav { position: sticky; top: 0; z-index: 60; background: rgba(10,14,13,0.72);
    backdrop-filter: saturate(140%) blur(12px); -webkit-backdrop-filter: saturate(140%) blur(12px); border-bottom: 1px solid var(--line); }
  .kit-nav__in { max-width: var(--maxw); margin: 0 auto; padding: 0.85rem var(--pad); display: flex; align-items: center; gap: 1.2rem; }
  .kit-nav__brand { font-family: var(--mono); font-weight: 700; font-size: 0.95rem; color: var(--ink); display: inline-flex; align-items: center; gap: 0.5rem; margin-right: auto; }
  .kit-nav__links { display: flex; gap: 1.5rem; }
  .kit-nav__link { font-family: var(--mono); font-size: 0.78rem; color: var(--ink-2); text-transform: lowercase; letter-spacing: 0.02em; transition: color 0.18s ease; display: inline-flex; align-items: baseline; gap: 0.4rem; cursor: pointer; }
  .kit-nav__idx { font-size: 0.62rem; color: var(--faint); }
  .kit-nav__link:hover, .kit-nav__link.is-active { color: var(--accent-ink); }
  .kit-nav__link.is-active .kit-nav__idx { color: var(--accent-deep); }
  .kit-nav__cta { font-family: var(--mono); font-size: 0.76rem; color: var(--accent-ink); border: 1px solid var(--line-2); border-radius: 999px; padding: 0.5rem 0.95rem; transition: border-color 0.18s ease, background 0.18s ease; cursor: pointer; }
  .kit-nav__cta:hover { border-color: var(--accent); background: var(--accent-dim); }
  @media (max-width: 760px) { .kit-nav__links { display: none; } .kit-nav__cta { margin-left: auto; } }

  /* shared section furniture */
  .kit-sec { padding: clamp(3.5rem, 9vw, 7rem) 0; border-top: 1px solid var(--line); }
  .kit-sec__title { font-family: var(--display); font-weight: 800; letter-spacing: -0.025em; font-size: clamp(2rem, 5.5vw, 3.6rem); max-width: 20ch; margin: 0; line-height: 1.02; }
  .kit-sec__intro { color: var(--ink-2); max-width: 46rem; margin: 1.1rem 0 0; font-size: 1.08rem; line-height: 1.55; }
  .kit-btn-row { display: flex; flex-wrap: wrap; gap: 0.7rem; }
  .kit-btn-row--center { justify-content: center; }

  /* HERO */
  .kit-hero { padding: clamp(3.5rem, 9vw, 7rem) 0 clamp(2.5rem, 6vw, 4.5rem); }
  .kit-hero__top { display: flex; flex-wrap: wrap; gap: 0.6rem 1rem; align-items: center; font-family: var(--mono); font-size: 0.76rem; color: var(--muted); margin-bottom: clamp(2rem, 5vw, 3.5rem); }
  .kit-hero__live { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--accent-ink); }
  .kit-hero__sep { color: var(--faint); }
  .kit-hero__right { margin-left: auto; }
  .kit-hero__grid { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,19rem); gap: clamp(1.8rem,4vw,4rem); align-items: end; }
  @media (max-width: 880px) { .kit-hero__grid { grid-template-columns: 1fr; align-items: start; } }
  .kit-hero__name { font-family: var(--display); font-weight: 800; letter-spacing: -0.04em; font-size: clamp(2.5rem,7vw,5rem); line-height: 0.92; text-transform: uppercase; margin: 0; }
  .kit-hero__name span { display: block; }
  .kit-hero__name .accent { color: var(--accent); }
  .kit-hero__role { font-family: var(--mono); font-size: clamp(0.85rem,2vw,1.05rem); color: var(--ink-2); letter-spacing: 0.04em; text-transform: uppercase; margin: 1.6rem 0 1.2rem; display: flex; flex-wrap: wrap; gap: 0.5rem 0.9rem; align-items: center; }
  .kit-hero__role b { color: var(--accent-ink); font-weight: 500; }
  .kit-hero__role .tick { color: var(--faint); }
  .kit-hero__sub { color: var(--ink-2); font-size: clamp(1.05rem,1.6vw,1.25rem); max-width: 38rem; line-height: 1.5; margin-bottom: 1.9rem; }

  /* PROJECTS / SKILLS grids */
  .kit-proj-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 1.1rem; margin-top: 2.6rem; }
  @media (max-width: 760px) { .kit-proj-grid { grid-template-columns: 1fr; } }
  .kit-skills { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 1.1rem; margin-top: 2.6rem; }
  @media (max-width: 720px) { .kit-skills { grid-template-columns: 1fr; } }

  /* TIMELINE */
  .kit-tl { margin-top: 2.6rem; }
  .kit-tl__legend { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); margin-top: 0.6rem; letter-spacing: 0.04em; }

  /* CLOSING BAND */
  .kit-cta { padding: clamp(4rem,10vw,8rem) 0; border-top: 1px solid var(--line); text-align: center; }
  .kit-cta__title { font-family: var(--display); font-weight: 800; letter-spacing: -0.03em; line-height: 0.96; font-size: clamp(2.4rem,8vw,5.5rem); text-transform: uppercase; margin: 0; }
  .kit-cta__title .accent { color: var(--accent); }
  .kit-cta p { color: var(--ink-2); max-width: 40rem; margin: 1.4rem auto 2.2rem; font-size: 1.1rem; }

  /* CONTACT */
  .kit-contact { padding: clamp(3rem,8vw,6rem) 0; min-height: calc(100vh - 16rem); }
  .kit-contact__grid { display: grid; grid-template-columns: 1fr minmax(0,24rem); gap: clamp(1.8rem,5vw,4rem); align-items: start; }
  @media (max-width: 880px) { .kit-contact__grid { grid-template-columns: 1fr; } }
  .kit-contact__title { font-family: var(--display); font-weight: 800; letter-spacing: -0.03em; font-size: clamp(2.4rem,7vw,4.5rem); text-transform: uppercase; line-height: 0.92; margin: 0; }
  .kit-contact__live { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); display: inline-flex; align-items: center; gap: 0.55rem; margin-top: 1.6rem; }

  /* RESUME */
  .kit-resume { padding: clamp(2.5rem,6vw,4rem) 0; }
  .kit-resume__grid { display: grid; grid-template-columns: minmax(0,1.55fr) minmax(0,1fr); gap: clamp(1.8rem,3.5vw,3rem); align-items: start; }
  @media (max-width: 920px) { .kit-resume__grid { grid-template-columns: 1fr; } }
  .kit-resume__frame { width: 100%; height: 70vh; min-height: 440px; border: 1px solid var(--line-2); border-radius: 12px; background: #fff; display: grid; place-items: center; padding: 2rem; }
  .kit-resume__doc { max-width: 26rem; text-align: center; font-family: var(--mono); color: #2a322f; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  .kit-resume__doc p { color: #4a534f; font-size: 0.92rem; line-height: 1.5; margin: 0; }
  .kit-resume__docnote { font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: #9aa39e; }
  .kit-gallery { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 0.7rem; margin-top: 1.4rem; }
  .kit-gallery figure { margin: 0; }
  .kit-gallery figure:first-child { grid-column: 1 / -1; }
  .kit-gallery a { display: block; overflow: hidden; border-radius: 11px; border: 1px solid var(--line); background: var(--bg-elev); }
  .kit-gallery img { width: 100%; height: 150px; object-fit: cover; display: block; filter: saturate(0.92) contrast(1.02); transition: transform 0.4s ease, filter 0.4s ease; }
  .kit-gallery figure:first-child img { height: 210px; }
  .kit-gallery a:hover img { transform: scale(1.05); filter: none; }
  .kit-gallery figcaption { font-family: var(--mono); font-size: 0.66rem; color: var(--muted); margin-top: 0.45rem; }

  /* PROSE (about) */
  .kit-prose-page { padding: clamp(3rem,7vw,5.5rem) 0; }
  .kit-prose { max-width: 52rem; }
  .kit-prose__h1 { font-family: var(--display); font-weight: 800; letter-spacing: -0.03em; text-transform: uppercase; font-size: clamp(2.6rem,7vw,4.5rem); margin: 0.4rem 0 2rem; line-height: 0.9; }
  .kit-prose p { color: var(--ink-2); margin: 1rem 0; line-height: 1.65; }
  .kit-prose h2 { font-family: var(--display); font-weight: 700; font-size: clamp(1.4rem,3vw,1.9rem); margin: 2.4rem 0 1rem; letter-spacing: -0.01em; color: var(--accent-ink); }
  .kit-prose ul { color: var(--ink-2); padding-left: 1.1rem; margin: 1rem 0; }
  .kit-prose li { margin: 0.55rem 0; line-height: 1.6; }
  .kit-prose li::marker { color: var(--accent-deep); }
  .kit-prose strong { color: var(--ink); }

  /* FOOTER */
  .kit-foot { border-top: 1px solid var(--line); background: var(--bg-sunk); padding: clamp(2.5rem,6vw,4rem) 0 2rem; }
  .kit-foot__in { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--pad); }
  .kit-foot__brand { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 2.5rem; }
  .kit-foot__big { font-family: var(--display); font-weight: 800; letter-spacing: -0.02em; font-size: clamp(1.6rem,5vw,2.8rem); }
  .kit-foot__tag { font-family: var(--mono); font-size: 0.78rem; color: var(--muted); }
  .kit-foot__grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 1.6rem; max-width: 34rem; }
  .kit-foot__col { display: flex; flex-direction: column; gap: 0.55rem; font-family: var(--mono); font-size: 0.82rem; }
  .kit-foot__col a { color: var(--ink-2); transition: color 0.16s ease; }
  .kit-foot__col a:hover { color: var(--accent-ink); }
  .kit-foot__k { color: var(--faint); font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 0.3rem; }
  .kit-foot__loc { color: var(--muted); display: inline-flex; align-items: center; gap: 0.5rem; }
  .kit-foot__live { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: var(--shadow-dot); animation: cwPulse 2.6s infinite; }
  .kit-foot__base { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 0.5rem; margin-top: 2.5rem; padding-top: 1.4rem; border-top: 1px solid var(--line); font-family: var(--mono); font-size: 0.72rem; color: var(--faint); }

  /* entrance + scroll reveal (signature Terminal-Noir motion) */
  html.js .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.7s cubic-bezier(0.2,0.7,0.2,1), transform 0.7s cubic-bezier(0.2,0.7,0.2,1); }
  html.js .reveal.in { opacity: 1; transform: none; }
  html.js .reveal[data-d="1"] { transition-delay: 0.08s; }
  html.js .reveal[data-d="2"] { transition-delay: 0.16s; }
  html.js .reveal[data-d="3"] { transition-delay: 0.24s; }
  html.js .reveal[data-d="4"] { transition-delay: 0.32s; }

  @media (prefers-reduced-motion: reduce) { .kit-foot__live { animation: none; } }
  @media (prefers-reduced-motion: reduce) { html.js .reveal { opacity: 1; transform: none; transition: none; } }
</style>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
      <rect width="240" height="240" fill="#0a0e0d"/>
      <circle cx="86" cy="120" r="20" fill="#c9f25b"/>
      <text x="120" y="150" font-family="monospace" font-size="92" font-weight="800" fill="#eef3f0" text-anchor="middle">N</text>
    </svg>
  </template>
  <div id="root"></div>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel" src="Home.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" data-presets="react">
    function App() {
      const [route, setRoute] = React.useState("home");
      const go = (r) => { setRoute(r); window.scrollTo({ top: 0, behavior: "auto" }); };
      React.useEffect(() => {
        const mark = (el) => el.classList.add("in");
        const all = () => document.querySelectorAll(".reveal:not(.in)");
        const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (reduce || !("IntersectionObserver" in window)) { all().forEach(mark); return; }
        const io = new IntersectionObserver((ents) => {
          ents.forEach((e) => { if (e.isIntersecting) { mark(e.target); io.unobserve(e.target); } });
        }, { threshold: 0.12, rootMargin: "0px 0px -8% 0px" });
        all().forEach((e) => io.observe(e));
        // safety net: never leave content hidden if the tab is backgrounded / IO never fires
        const fallback = setTimeout(() => all().forEach(mark), 1600);
        return () => { io.disconnect(); clearTimeout(fallback); };
      }, [route]);
      const Screen = { home: window.Home, contact: window.Contact, resume: window.Resume, about: window.About }[route] || window.Home;
      return (
        <React.Fragment>
          <window.Atmosphere />
          <window.Nav route={route} go={go} />
          <main><Screen go={go} /></main>
          <window.Footer go={go} />
        </React.Fragment>
      );
    }
    // wait for data + babel-transpiled component files to register on window
    function boot() {
      if (!window.DATA || !window.Home || !window.Nav || !window.Contact) { setTimeout(boot, 40); return; }
      document.documentElement.classList.add("js");
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    }
    boot();
  </script>
  <script src="data.js"></script>
</body>
</html>
