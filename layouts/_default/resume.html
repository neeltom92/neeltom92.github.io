{{ define "title" }}Résumé · Neel Thomas Thelly{{ end }}

{{ define "content" }}
{{ $resume := "resume.pdf" | relURL }}
<div class="nt-home">
  <section class="nt-section" style="border-top:none; padding:clamp(1.5rem,4vw,2.5rem) 0 3rem">
    <div class="nt-wrap nt-resume__layout">

      <!-- the document -->
      <div class="nt-resume__doc">
        <nav class="nt-cta" aria-label="résumé actions" style="margin-bottom:1.1rem">
          <a class="nt-btn nt-btn--primary" href="{{ $resume }}" download="Neel_Thomas_Thelly_Resume.pdf">↓ Download PDF</a>
          <a class="nt-btn" href="{{ $resume }}" target="_blank" rel="noopener">Open raw ↗</a>
        </nav>
        <iframe class="nt-resume__frame" src="{{ $resume }}#view=FitH" title="Résumé of Neel Thomas Thelly" loading="lazy"></iframe>
      </div>

      <!-- off-duty gallery -->
      <aside class="nt-resume__gallery" aria-label="photo gallery">
        <p class="nt-eyebrow">Off-duty · field notes</p>
        <h2 class="nt-section__title" style="font-size:clamp(1.4rem,3vw,1.9rem); margin-bottom:0.4rem">Beyond the terminal</h2>
        <p style="color:var(--ink-2); font-size:0.95rem; margin:0">
          When I'm not keeping systems up: building, chasing rockets, and exploring the American Southwest.
        </p>

        <div class="nt-gallery">
          <figure>
            <a href="{{ "images/gallery/desk.jpg" | relURL }}" target="_blank" rel="noopener">
              <img src="{{ "images/gallery/desk.jpg" | relURL }}" alt="Home workstation with dual monitors and code on screen" loading="lazy">
            </a>
            <figcaption>Home setup — heads-down</figcaption>
          </figure>
          <figure>
            <a href="{{ "images/gallery/shuttle.jpg" | relURL }}" target="_blank" rel="noopener">
              <img src="{{ "images/gallery/shuttle.jpg" | relURL }}" alt="In front of Space Shuttle Independence" loading="lazy">
            </a>
            <figcaption>Space Shuttle Independence</figcaption>
          </figure>
          <figure>
            <a href="{{ "images/gallery/astronaut.jpg" | relURL }}" target="_blank" rel="noopener">
              <img src="{{ "images/gallery/astronaut.jpg" | relURL }}" alt="Astronaut suit cutout at the space center" loading="lazy">
            </a>
            <figcaption>Suiting up · Space Center</figcaption>
          </figure>
          <figure>
            <a href="{{ "images/gallery/hooverdam.jpg" | relURL }}" target="_blank" rel="noopener">
              <img src="{{ "images/gallery/hooverdam.jpg" | relURL }}" alt="At the Hoover Dam bypass bridge" loading="lazy">
            </a>
            <figcaption>Hoover Dam bypass bridge</figcaption>
          </figure>
          <figure>
            <a href="{{ "images/gallery/grandcanyon.jpg" | relURL }}" target="_blank" rel="noopener">
              <img src="{{ "images/gallery/grandcanyon.jpg" | relURL }}" alt="Grand Canyon, Arizona" loading="lazy">
            </a>
            <figcaption>Grand Canyon, Arizona</figcaption>
          </figure>
        </div>
      </aside>

    </div>
  </section>
</div>
{{ end }}
